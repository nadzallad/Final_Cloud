services:
  shipment_postgres:
    image: postgres:16
    container_name: shipment_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: shipment_db
    ports:
      - "5436:5432"
    volumes:
      - shipment_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: shipment_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  shipment-service:
    build: .
    container_name: shipment_service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: shipment_postgres
      DB_PASS: admin123
      DB_NAME: shipment_db
      ORDER_SERVICE_URL: http://order-service:8081
    depends_on:
      shipment_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

volumes:
  shipment_pg_data: